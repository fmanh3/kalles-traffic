name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kalles-traffic
      uses: actions/checkout@v4
      with:
        path: kalles-traffic

    - name: Checkout kalles-finance (for shared schemas)
      uses: actions/checkout@v4
      with:
        repository: fmanh3/kalles-finance
        path: kalles-finance
        # Assumes the repo is public or the runner has access

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install dependencies
      run: npm ci
      working-directory: ./kalles-traffic

    - name: Build TypeScript
      run: npm run build
      working-directory: ./kalles-traffic

    # Kalles Traffic har inga riktiga tester än, så vi kommenterar ut npm test för att inte faila bygget
    # - name: Run tests
    #   run: npm test
